id: monthly_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.40.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.7.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-big-life
    version: "0.0.8.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mep
    version: "0.0.16.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

rjsf-overrides:
  properties:
    Subject Group.properties.subject_group_var.properties.var.title: Subject Group Name
    Subject Group.properties.subject_group_var.properties.var.default: Elephants
    

workflow:
  # set workflow details
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  # define time range
  - name: Define analysis time range
    id: time_range
    task: set_time_range

  # set groupers -- limiting this to subject_name
  - name: Configure grouping strategy
    id: groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: "name"

  # set basemaps
  - name: Configure base map layers
    id: configure_base_maps
    task: set_base_maps_pydeck

  # connect to earthranger
  - name: Connect to earth ranger
    id: er_client_name
    task: set_er_connection

  # get events -- elephant sighting and persist file
  - name: Retrieve all events
    id: get_events_data
    task: get_events
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  - name: Exclude geom outliers from events
    id: exclude_mep_outliers
    task: exclude_geom_outliers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.get_events_data.return }}
      z_threshold: 3

  - name: Remove invalid event  points
    id: remove_mep_invalid_geoms
    task: ecoscope_workflows_ext_custom.tasks.transformation.drop_null_geometry
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      gdf: ${{ workflow.exclude_mep_outliers.return }}
      geometry_column: geometry

  - name: Apply colormap to events 
    id: apply_event_colormap 
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.remove_mep_invalid_geoms.return }}
      input_column_name: event_type 
      output_column_name: event_type_colors 
      colormap: tab20

  - name: Generate events point layers
    id: generate_mb_layers
    task: create_scatterplot_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_fill_color: event_type_colors
        get_line_color: event_type_colors
        get_line_width: 0.55
        get_radius: 3.55
        opacity: 0.75
        stroked: true
      legend:
        title: Legend
        label_column: event_type 
        color_column: event_type_colors
        sort: null 
        label_suffix: null 
      geodataframe: ${{ workflow.apply_event_colormap.return }}

  # global zoom value
  - name: Events zoom value
    id: sighting_zoom_value
    task: view_state_deck_gdf
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.remove_mep_invalid_geoms.return }}

  - name: Draw elephant sightings map
    id: draw_sightings_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.generate_mb_layers.return }}
      view_state: ${{ workflow.sighting_zoom_value.return }}

  - name: Persist elephant sightings map
    id: persist_sightings_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_sightings_map.return }}
      filename: elephant_sightings_map.html # -- convert this to png

  # get relocations  -- collar voltages for subjects and persist file
  - title: Subject Group
    type: task-group
    description: Choose subject group to generate collar voltage charts and overall speedmap
    tasks:
      - name: null
        id: subject_group_var
        task: set_string_var

  - name: Get subject group observations
    id: subject_observations
    task: get_subjectgroup_observations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      filter: clean
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      subject_group_name: ${{ workflow.subject_group_var.return }} # pass this to word doc
      raise_on_empty: false
      include_details: true
      include_subjectsource_details: true

  - name: Transform observations to relocations
    id: subject_reloc
    task: process_relocations
    partial:
      observations: ${{ workflow.subject_observations.return }}
      relocs_columns:
        - groupby_col
        - fixtime
        - junk_status
        - geometry
        - extra__subject__name
        - extra__subject__hex
        - extra__subject__sex
        - extra__created_at
        - extra__subject__subject_subtype
        - extra__subjectsource__id
        - extra__subjectsource__assigned_range
        - extra__observation_details

      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Get previous period
    id: get_custom_previous_period
    task: get_previous_period
    partial:
      time_range: ${{ workflow.time_range.return }}

  - name: Get subject group observations for previous relocs
    id: previous_subject_observations
    task: get_subjectgroup_observations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      filter: clean
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.get_custom_previous_period.return }}
      subject_group_name: ${{ workflow.subject_group_var.return }}
      raise_on_empty: false
      include_details: true
      include_subjectsource_details: true

  - name: Transform previous observations to relocations
    id: previous_subject_reloc
    task: process_relocations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      observations: ${{ workflow.previous_subject_observations.return }}
      relocs_columns:
        - groupby_col
        - fixtime
        - junk_status
        - geometry
        - extra__subject__name
        - extra__subject__hex
        - extra__subject__sex
        - extra__created_at
        - extra__subject__subject_subtype
        - extra__subjectsource__id
        - extra__subjectsource__assigned_range
        - extra__observation_details

      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Create collared charts for all subjects
    id: process_subject_charts
    task: process_collar_voltage_charts
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      relocs: ${{ workflow.subject_observations.return }}
      previous_relocs: ${{ workflow.previous_subject_observations.return }}
      time_range: ${{ workflow.time_range.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }} # convert outputs to png

  # relocs to trajectories -- speedmap and persist file
  - name: Convert relocations to trajectories
    id: convert_to_trajectories
    task: relocations_to_trajectory
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      relocations: ${{ workflow.subject_reloc.return }}
      trajectory_segment_filter:
        min_length_meters: 0.001
        max_length_meters: 5000
        min_time_secs: 1
        max_time_secs: 21600
        min_speed_kmhr: 0.01
        max_speed_kmhr: 9

  - name: Add temporal index to trajectories
    id: add_temporal_index_to_traj
    task: add_temporal_index
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.convert_to_trajectories.return }}
      time_col: segment_start
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Classify trajectories by speed
    id: classify_trajectories_speed_bins
    task: apply_classification
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.add_temporal_index_to_traj.return }}
      input_column_name: speed_kmhr
      output_column_name: speed_bins
      classification_options:
        scheme: equal_interval
        k: 6
      label_options:
        label_ranges: true
        label_decimals: 1
        label_suffix: " km/h"

  - name: Sort trajectories by speed bins
    id: sort_trajs_by_speed
    task: sort_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column_name: speed_bins
      na_position: first
      ascending: true
      df: ${{ workflow.classify_trajectories_speed_bins.return }}

  - name: Apply colormap to speed bins
    id: apply_speed_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      input_column_name: speed_bins
      output_column_name: speed_bins_colormap
      colormap:
        - "#1a9850"
        - "#91cf60"
        - "#d9ef8b"
        - "#fee08b"
        - "#fc8d59"
        - "#d73027"
      df: ${{ workflow.sort_trajs_by_speed.return }}

  - name: Exclude unnecessary columns from speedmap gdf
    id: filter_speed_cols
    task: filter_df_cols
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      columns:
        - dist_meters
        - speed_bins_colormap
        - geometry
        - speed_kmhr
        - speed_bins
      df: ${{ workflow.apply_speed_colormap.return }}

  - name: Generate speedmap layers
    id: generate_speedmap_layers
    task: create_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_color: speed_bins_colormap
        get_width: 2.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 8
        width_units: pixels
        cap_rounded: true
        joint_rounded: true
        billboard: false
        opacity: 0.55
        stroked: true
      legend:
        title: Speed (km/h)
        label_column: speed_bins
        color_column: speed_bins_colormap
        sort: ascending
        label_suffix: null
      geodataframe: ${{ workflow.filter_speed_cols.return }}

  - name: Zoom to gdf extent
    id: zoom_speed_gdf_extent
    task: view_state_deck_gdf
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.filter_speed_cols.return }}

  - name: Draw speedmap
    id: draw_speedmap
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: bottom-right
      geo_layers: ${{ workflow.generate_speedmap_layers.return }}
      view_state: ${{ workflow.zoom_speed_gdf_extent.return }}

  - name: Persist speedmap html
    id: persist_speedmap_html
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: speedmap
      text: ${{ workflow.draw_speedmap.return }}

  # generate sitrep report -- persist df
  - name: Get sitrep config
    id: get_sitrep_config
    task: get_sitrep_event_config
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      region_column: region

  - name: Generate sitrep report
    id: generate_sitrep_df
    task: compile_sitrep
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      er_io: ${{ workflow.er_client_name.return }}
      event_details: ${{ workflow.get_sitrep_config.return }}
      time_range: ${{ workflow.time_range.return }}

  - name: Persist sitrep as csv
    id: persist_sitrep_csv
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: sitrep_report
      df: ${{ workflow.generate_sitrep_df.return }}

  - name: Retrieve vehicle patrols
    id: vehicle_patrols
    task: get_patrol_observations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      include_patrol_details: true
      raise_on_empty: false
      sub_page_size: 100
      patrols_overlap_daterange: true

  - name: Transform observations to relocations
    id: vehicle_patrol_reloc
    task: process_relocations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      observations: ${{ workflow.vehicle_patrols.return }}
      relocs_columns:
        - patrol_id
        - patrol_start_time
        - patrol_end_time
        - geometry
        - patrol_type__value
        - patrol_type__display
        - patrol_serial_number
        - patrol_status
        - patrol_subject
        - groupby_col
        - fixtime
        - junk_status
        - extra__source

      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Transform relocations to trajectories
    id: vehicle_patrol_traj
    task: relocations_to_trajectory
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      relocations: ${{ workflow.vehicle_patrol_reloc.return }}
      trajectory_segment_filter:
        min_length_meters: 0.35
        max_length_meters: 5000.0
        max_time_secs: 18000.0
        min_time_secs: 1.0
        max_speed_kmhr: 100.0
        min_speed_kmhr: 10.0

  - name: Persist vehicle patrol trajectories
    id: persist_vehicle_traj
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.vehicle_patrol_traj.return }}
      filetype: geoparquet
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: vehicle_patrol_trajectories

  - name: Vehicle patrol trajectories colormap
    id: vehicle_traj_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.vehicle_patrol_traj.return }}
      colormap: viridis
      input_column_name: extra__patrol_type__value
      output_column_name: patrol_type_colormap

  - name: Vehicle patrols zoom value
    id: vehicle_zoom_value
    task: view_state_deck_gdf
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.vehicle_traj_colormap.return }}

  - name: Create vehicle patrol layers
    id: vehicle_patrol_path_layer
    task: create_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_color: patrol_type_colormap
        get_width: 2.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 8
        width_units: pixels
        cap_rounded: true
        joint_rounded: true
        billboard: false
        opacity: 0.55
        stroked: true
      legend:
        title: Patrol team
        label_column: extra__patrol_type__value
        color_column: patrol_type_colormap
        sort: ascending
        label_suffix: null
      geodataframe: ${{ workflow.vehicle_traj_colormap.return }}

  - name: Draw vehicle patrols map
    id: draw_vehicles_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.vehicle_patrol_path_layer.return }}
      view_state: ${{ workflow.vehicle_zoom_value.return }}

  - name: Persist vehicle patrols as text
    id: vehicle_patrol_map
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: vehicle_patrols_map.html
      text: ${{ workflow.draw_vehicles_map.return }} # convert this to png

  # foot patrols
  - name: Retrieve foot patrols
    id: foot_patrols
    task: get_patrol_observations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      include_patrol_details: true
      raise_on_empty: false
      sub_page_size: 100
      patrols_overlap_daterange: true

  - name: Transform observations to relocations
    id: foot_patrol_reloc
    task: process_relocations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      observations: ${{ workflow.foot_patrols.return }}
      relocs_columns:
        - patrol_id
        - patrol_start_time
        - patrol_end_time
        - geometry
        - patrol_type__value
        - patrol_type__display
        - patrol_serial_number
        - patrol_status
        - patrol_subject
        - groupby_col
        - fixtime
        - junk_status
        - extra__source

      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Transform relocations to trajectories
    id: foot_patrol_traj
    task: relocations_to_trajectory
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      relocations: ${{ workflow.foot_patrol_reloc.return }}
      trajectory_segment_filter:
        min_length_meters: 0.001
        max_length_meters: 5000.0
        max_time_secs: 14400.0
        min_time_secs: 1.0
        max_speed_kmhr: 9.0
        min_speed_kmhr: 0.5

  - name: Persist foot patrol trajectories
    id: persist_foot_traj
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.foot_patrol_traj.return }}
      filetype: geoparquet
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: foot_patrol_trajectories

  - name: Foot patrol trajectories colormap
    id: foot_traj_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.foot_patrol_traj.return }}
      colormap: viridis
      input_column_name: extra__patrol_type__value
      output_column_name: patrol_type_colormap

  - name: Foot patrols zoom value
    id: foot_zoom_value
    task: view_state_deck_gdf
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      pitch: 0
      bearing: 0
      gdf: ${{ workflow.foot_traj_colormap.return }}

  - name: Create foot patrol layers
    id: foot_patrol_path_layer
    task: create_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        get_color: patrol_type_colormap
        get_width: 2.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 8
        width_units: pixels
        cap_rounded: true
        joint_rounded: true
        billboard: false
        opacity: 0.55
        stroked: true
      legend:
        title: Patrol team
        label_column: extra__patrol_type__value
        color_column: patrol_type_colormap
        sort: ascending
        label_suffix: null
      geodataframe: ${{ workflow.foot_traj_colormap.return }}

  - name: Draw foot patrols map
    id: draw_foot_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.foot_patrol_path_layer.return }}
      view_state: ${{ workflow.foot_zoom_value.return }}

  - name: Persist foot patrols as text
    id: foot_patrol_map
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: foot_patrols_map.html
      text: ${{ workflow.draw_foot_map.return }} # convert this to png

  # html to png
  - name: Convert elephant sighting events html to png
    id: convert_sightings_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_sightings_urls.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000 
        max_concurrent_pages: 1

  - name: Convert elephant speedmap html to png
    id: convert_speedmap_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_speedmap_html.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000 
        max_concurrent_pages: 1

  - name: Convert vehicle patrol html to png
    id: convert_vehicle_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.vehicle_patrol_map.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1

  - name: Convert foot patrol html to png
    id: convert_foot_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.foot_patrol_map.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1

  - name: Convert collared plot html to png
    id: convert_collared_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.process_subject_charts.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 10
        max_concurrent_pages: 1

  - name: Download monthly cover page template
    id: download_cover_page
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/95fux8w00h9u4wg2sufij/mep_monthly_report.docx?rlkey=nbibg8ulnlz0w4q53jw2db6y3&st=6own6h01&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Download monthly content template
    id: download_content_page
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/1u7d68pr8hvc27gf2ns85/mep_monthly_indv_report.docx?rlkey=wss0x8sa9i5fgl9yjco7paa03&st=b8fsdnxg&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Create cover template context
    id: create_cover_tpl_context
    task: create_monthly_ctx_cover
    partial:
      report_period: ${{ workflow.time_range.return }}
      prepared_by: "Ecoscope"

  - name: Persist cover page context
    id: persist_cover_context
    task: create__mep_context_page
    partial:
      template_path: ${{ workflow.download_cover_page.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      context: ${{ workflow.create_cover_tpl_context.return }}
      filename: mep_cover_page.docx

  - name: Create monthly report
    id: create_monthly_ctx
    task: create_mep_monthly_context
    partial:
      filename: mep_context.docx
      template_path: ${{ workflow.download_content_page.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      elephant_sightings_map_path: ${{ workflow.convert_sightings_png.return }}
      speedmap_path: ${{ workflow.convert_speedmap_png.return }}
      foot_patrols_map_path: ${{ workflow.convert_foot_png.return }}
      vehicle_patrol_map_path: ${{ workflow.convert_vehicle_png.return }}
      subject_group: ${{ workflow.subject_group_var.return }} 
      collared_elephant_plot_paths: ${{ workflow.convert_collared_png.return }}
      sitrep_df_path: ${{ workflow.persist_sitrep_csv.return }}

  - name: Merge mep word docs
    id: merge_mep_docx
    task: merge_mapbook_files
    partial:
      cover_page_path: ${{ workflow.persist_cover_context.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      context_page_items:
        - ${{ workflow.create_monthly_ctx.return }}
      filename: "overall_mep_monthly_report.docx"

